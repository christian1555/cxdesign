<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>TrueTab</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Highlight.js CSS for code syntax highlighting -->
    <link rel="stylesheet" href="css/highlight-github.min.css">

    <!-- Icon Pack CDNs - Multiple sources with fallbacks -->
    <script src="libs/iconify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Optional: Lightweight libraries similar to newtabclone -->
    <script src="libs/moment.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="bottom-bar">
            <button class="btn" id="settingsBtn" title="Settings">
                <span class="iconify" data-icon="material-symbols:settings-outline" data-width="20" data-height="20"></span>
            </button>
            <button class="btn" id="editBtn" title="Unlock">
                <span class="iconify" data-icon="material-symbols:lock-outline" data-width="20" data-height="20"></span>
            </button>
        </div>

        <!-- Edit Mode Tip Banner -->
        <div class="edit-mode-tip" id="editModeTip" style="display: none;">
            <span class="iconify" data-icon="mdi:information-outline" data-width="18" data-height="18"></span>
            <span class="tip-text">To make sure your changes are saved properly, only have 1 instance of a newtab open when doing changes.</span>
            <button class="tip-close-btn" id="closeTipBtn" title="Dismiss">✕</button>
        </div>

        <div class="grid-container" id="gridContainer">
            <!-- Widgets will be positioned here -->
        </div>
    </div>

    <!-- Add Widget/App Popup - Content generated by JavaScript -->
    <div class="widget-settings-popup" id="addWidgetModal">
        <!-- Content will be dynamically generated by settings.js -->
    </div>

    <!-- Settings Modal - Content generated by JavaScript -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <!-- Content will be dynamically generated by settings.js -->
        </div>
    </div>

    <!-- Widget Settings Popup -->
    <div class="widget-settings-popup" id="widgetSettingsPopup">
        <div class="widget-settings-header">
            <h3 id="widgetSettingsTitle" style="flex: 1; margin: 0; font-size: 18px; color: var(--settings-accent-color);">Widget Settings</h3>
            <button class="close-settings" style="position: static; margin: 0;">✕</button>
        </div>
        <div class="popup-scrollable-content" id="widgetSettingsContent">
            <!-- Dynamic content will be inserted here -->
        </div>
    </div>

    <!-- Markdown Libraries for Chatbot -->
    <script src="libs/markdown-it.min.js"></script>
    <script src="libs/markdown-it-attrs.min.js"></script>
    <script src="libs/markdown-it-task-lists.min.js"></script>
    <script src="libs/dompurify.min.js"></script>
    <script src="libs/highlight.min.js"></script>

    <!-- Widget Scripts -->
    <script src="widgets/clock.js"></script>
    <script src="widgets/weather.js"></script>
    <script src="widgets/og-search.js"></script>
    <script src="widgets/quote.js"></script>
    <script src="widgets/calendar.js"></script>
    <script src="widgets/stocks.js"></script>
    <script src="widgets/chatbot.js"></script>
    <script src="widgets/cinema.js"></script>
    <script src="widgets/bar-youtube.js"></script>
    <script src="widgets/bar-wikipedia.js"></script>
    <script src="widgets/bar-amazon.js"></script>
    <script src="widgets/bar-reddit.js"></script>
    <script src="widgets/bar-ebay.js"></script>
    <script src="widgets/input-bar.js"></script>
    <script src="widgets/apps.js"></script>
    <script src="widgets/app.js"></script>
    <script src="widgets/empty.js"></script>

    <!-- Iconify Icon Picker -->
    <script src="iconify-picker.js"></script>

    <!-- TrueTab Modules -->
    <script src="modules/utils.js"></script>
    <script src="modules/grid.js"></script>
    <script src="modules/widgets.js"></script>
    <script src="modules/drag-resize.js"></script>
    <script src="modules/layout.js"></script>
    <script src="modules/appearance.js"></script>
    <script src="modules/font-normalizer.js"></script>
    <script src="modules/settings.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/auth-ui.js"></script>
    <script src="modules/cloud.js"></script>
    <script src="modules/main.js"></script>

    <!-- Rubber Band Scroll Effect (Chrome only) -->
    <script src="rubber-band-scroll.js"></script>
</body>
</html>
